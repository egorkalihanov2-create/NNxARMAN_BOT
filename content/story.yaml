acts:
  act_1:
    title: "Акт 1"
    entry_segment: act1_wakeup

segments:
  act1_wakeup:
    act: act_1
    render_mode: html
    messages:
      - type: character
        character: masha
        variant: default
        text: "эй...эй..."
      - type: placeholder
        label: "видеокружок"
        text: "трясущаяся камера, постепенно проявляется медсестра"
      - type: character
        character: masha
        variant: intro
        label: "маша"
        text: "с вами все нормально?"
    interaction:
      type: reply_choice
      choices:
        - id: okay
          label: "да, вроде того..."
          target: act1_repeat_numbers

  act1_repeat_numbers:
    act: act_1
    render_mode: html
    messages:
      - type: character
        character: masha
        variant: compact
        text: "так, повторяйте за мной: 1, 2, 3"
      - type: text
        text: "<i>напиши текст в чат - тебе обязательно ответят</i>"
    interaction:
      type: text_input
      answer_mode: digits
      answers:
        - "123"
      on_correct: act1_masha_alive
      on_wrong: act1_repeat_numbers
      wrong_text: "Попробуй еще раз: 1, 2, 3."

  act1_masha_alive:
    act: act_1
    render_mode: html
    messages:
      - type: character
        character: masha
        variant: compact
        text: "ну слава богу! живой!"
    interaction:
      type: reply_choice
      choices:
        - id: who_are_you
          label: "кто ты?"
          target: act1_who_are_you

  act1_who_are_you:
    act: act_1
    render_mode: html
    messages:
      - type: character
        character: masha
        variant: compact
        text: "я? 😷 да так... прохожу тут практику"
      - type: character
        character: lor
        variant: intro
        label: "виталя"
        text: "ааа, опять прохлаждаешься, да? я упомяну это в отчете для твоего вуза!"
      - type: character
        character: masha
        variant: compact
        text: "но я..."
    interaction:
      type: choice
      choices:
        - id: defend_masha
          label: "она помогла мне"
          target: act1_helped_masha
        - id: stay_silent
          label: "промолчать"
          target: act1_stayed_silent

  act1_stayed_silent:
    act: act_1
    render_mode: html
    messages:
      - type: text
        text: "<i>[путь Б пока не расписан]</i>"
    interaction:
      type: choice
      choices:
        - id: return_to_help_path
          label: "вернуться к черновику пути А"
          target: act1_helped_masha

  act1_helped_masha:
    act: act_1
    render_mode: html
    messages:
      - type: character
        character: lor
        variant: compact
        text: "с чем это? аййй, тьфу на вас, помощники!"
      - type: character
        character: masha
        variant: compact
        text: "спасибо тебе! он привязывается ко мне по любому поводу... меня маша зовут, а тебя?"
    interaction:
      type: capture_text
      variable: player_name
      target: act1_after_name

  act1_after_name:
    act: act_1
    render_mode: html
    messages:
      - type: character
        character: masha
        variant: compact
        text: "приятно познакомиться, {player_name}."
      - type: placeholder
        label: "достижение"
        text: "Познакомиться с Машей"
      - type: character
        character: masha
        variant: compact
        text: "чего ждешь? свою очередь? так вот же кабинет, заходи!"
      - type: character
        character: babusya
        variant: intro
        label: "бабуся"
        text: "у нас тут живая очередь вообще-то!"
      - type: character
        character: masha
        variant: compact
        text: "но у него талон на время..."
      - type: character
        character: babusya
        variant: compact
        text: "а у меня трость смотри какая..."
      - type: placeholder
        label: "стикер"
        text: "трость"
      - type: character
        character: babusya
        variant: compact
        text: "как тресну!"
      - type: character
        character: masha
        variant: intro
        label: "удачи"
        text: "да уж... тут я уже не помогу... удачи, {player_name}!)"
    interaction:
      type: choice
      choices:
        - id: argue_with_babusya
          label: "поспорить с бабушкой"
          target: act1_argue_babusya
        - id: let_babusya_go
          label: "пропустить ее"
          target: act1_let_babusya_go

  act1_argue_babusya:
    act: act_1
    render_mode: html
    messages:
      - type: text
        text: "<i>[ветка спора с бабушкой пока не расписана]</i>"
    interaction:
      type: choice
      choices:
        - id: continue
          label: "продолжить черновик"
          target: act1_notice_boy

  act1_let_babusya_go:
    act: act_1
    render_mode: html
    messages:
      - type: character
        character: babusya
        variant: intro
        label: "бабуся"
        text: "мило с твоей стороны. знай! милых мир не любит!"
    interaction:
      type: choice
      choices:
        - id: continue
          label: "осмотреться"
          target: act1_notice_boy

  act1_notice_boy:
    act: act_1
    render_mode: html
    messages:
      - type: text
        text: "<i>вы замечаете мальчишку, забившегося в угол от страха</i>"
    interaction:
      type: reply_choice
      choices:
        - id: talk_to_boy
          label: "заговорить с мальчиком"
          target: act1_talk_to_boy

  act1_talk_to_boy:
    act: act_1
    render_mode: html
    messages:
      - type: text
        text: "{player_name} - ты чего там?"
      - type: character
        character: boy
        variant: intro
        label: "???"
        text: "а? я? я? я последний!"
      - type: text
        text: "{player_name} - да я не спрашивал... ты чего трясешься?"
      - type: character
        character: boy
        variant: compact
        text: "мой... зин... он совсем порвался! он расклеился и все странички рассыпались! мне... мне нужен реабилитолог! мне нужно залечить мой зин!"
      - type: placeholder
        label: "фото"
        text: "порванный зин"
      - type: text
        text: "{player_name} - эту книжку что ли?"
      - type: character
        character: boy
        variant: compact
        text: "это совсем-совсем не книжка! в книжках пишут о всяких героях, злодеях... а зин! зин он про меня! смотри, здесь есть все: вот страничка про мои любимые машины! вот про футболистов! вот сюда я вклеил несколько цветов, их любит моя сестра! зин - это совсем не книжка!"
      - type: placeholder
        label: "серия фото"
        text: "страницы зина: машины, футболисты, цветы"
      - type: text
        text: "{player_name} - ты его сам собрал? научишь?"
      - type: character
        character: boy
        variant: compact
        text: "научу конечно! если сошьем мой... мне нужен реби.. реа... реа-би-ли-то-лог!"
    interaction:
      type: choice
      choices:
        - id: finish_act
          label: "завершить акт"
          target: act1_end

  act1_end:
    act: act_1
    render_mode: html
    messages:
      - type: text
        text: |
          <b>Конец 1 акта</b>

          <i>[эту часть оформим позже]</i>

          <b>Достижения:</b>

          ✅ Познакомиться с Машей
          ✅ Помочь Ване
          ❌ Познакомиться с лором Виталей

          <b>Персонажи:</b>

          🗝 Маша
          Практикантка с добрыми глазами

          🗝 Бабуся из очереди

          ??? Мальчишка с зином
    interaction:
      type: choice
      choices:
        - id: restart
          label: "начать акт заново"
          target: act1_wakeup
